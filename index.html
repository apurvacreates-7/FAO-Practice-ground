<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>SSB Interview Question Prep — Future Army Officers Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-functions-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-storage-compat.js"></script>
<style>
/* ============ Tokens (FAOSSB brand) ============ */
:root{
  --olive:#4A5D23; --olive-dark:#3B4A1C; --olive-darker:#2A3614;
  --olive-tint:#6B7E45; --olive-soft:#E8E6D9; --olive-line:#C7C5B0;
  --gold:#C5A55A; --gold-soft:#E8D9B4; --gold-line:#B8995A;
  --paper:#F5F3EE; --paper-soft:#EFEDE6; --paper-deep:#E8E5DC;
  --ink:#1A1A1A; --ink-2:#3A3A36; --ink-3:#5A5A56; --ink-4:#8A8A82; --ink-5:#B8B6AC;
  --success:#2E7D32; --warning:#F57F17; --danger:#C62828;
  --radius:4px; --radius-lg:8px;
  --shadow-card:0 1px 0 rgba(58,58,54,.04), 0 2px 6px rgba(58,58,54,.04);
  --shadow-pop:0 8px 28px rgba(26,26,26,.14);
  --font-sans:"Inter",ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  --font-mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --tracking-hd:0.12em; --tracking-md:0.08em;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper); color:var(--ink);
  font-family:var(--font-sans); font-size:14px; line-height:1.5;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  min-height:100vh;
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
input,textarea,select{font-family:inherit; color:inherit;}
a{color:var(--olive); text-decoration:none;}
a:hover{text-decoration:underline;}

/* ============ Type ============ */
.mono{font-family:var(--font-mono);}
.eyebrow{
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:var(--tracking-hd);
  text-transform:uppercase; color:var(--ink-3); font-weight:500;
}
.eyebrow-olive{color:var(--olive);}
.eyebrow-gold{color:var(--gold-line);}
.h-section{
  font-weight:700; font-size:11px; letter-spacing:var(--tracking-hd);
  text-transform:uppercase; color:var(--ink); margin:0;
}
.h-page{
  font-weight:700; font-size:26px; letter-spacing:-0.02em;
  color:var(--ink); margin:0; line-height:1.15;
}
.h-card{font-weight:600; font-size:15px; letter-spacing:-0.005em; color:var(--ink); margin:0;}

/* ============ Top banner ============ */
.banner{
  background:#fff; color:var(--ink);
  border-bottom:1px solid var(--olive-line);
  box-shadow:inset 0 -3px 0 var(--gold);
  padding:12px 24px 14px;
  display:flex; align-items:center; gap:18px;
  position:sticky; top:0; z-index:50;
}
.banner-logo{
  height:42px; width:auto; flex:none;
  display:block;
}
.banner-divider{
  width:1px; height:34px; background:var(--olive-line); flex:none;
}
.banner-tag{
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--olive); font-weight:600;
  line-height:1.3;
}
.banner-tag small{
  display:block; font-size:9.5px; letter-spacing:0.16em;
  color:var(--ink-4); font-weight:500; margin-top:3px;
}
.banner-right{margin-left:auto; display:flex; align-items:center; gap:14px;}
.banner-user{
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--ink-3);
}
.banner-stamp{
  border:1px solid var(--gold-line); background:var(--paper);
  padding:4px 9px; font-family:var(--font-mono);
  font-size:9.5px; letter-spacing:0.2em; text-transform:uppercase;
  color:var(--olive-darker);
}
@media (max-width:640px){
  .banner{padding:10px 14px 12px; gap:12px;}
  .banner-logo{height:34px;}
  .banner-divider{display:none;}
  .banner-tag{display:none;}
  .banner-right{gap:8px;}
  .banner-stamp{display:none;}
}

/* ============ Page frame ============ */
.page{
  max-width:1180px; margin:0 auto; padding:28px 24px 60px;
}
@media (max-width:640px){ .page{padding:18px 14px 60px;} }

/* ============ Sidebar + shell ============ */
body.has-side #app{ padding-left:248px; }
@media (max-width:900px){ body.has-side #app{ padding-left:0; } }

.sidebar{
  position:fixed; top:var(--banner-h,66px); left:0; bottom:0; width:248px; z-index:40;
  background:var(--ink); color:var(--paper);
  border-right:1px solid #000;
  display:flex; flex-direction:column;
  box-shadow:inset -3px 0 0 var(--gold);
}
.side-nav{ flex:1; padding:18px 14px; display:flex; flex-direction:column; gap:4px; overflow-y:auto; }
.side-brand{
  display:flex; align-items:center; gap:9px; padding:6px 10px 16px;
  margin-bottom:6px; border-bottom:1px solid rgba(245,243,238,.1);
}
.side-brand-mark{ color:var(--gold); font-size:14px; }
.side-brand-txt{
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.16em;
  text-transform:uppercase; color:rgba(245,243,238,.65);
}
.side-close{
  display:none; margin-left:auto; width:28px; height:28px; flex:none;
  border:1px solid rgba(245,243,238,.2); border-radius:var(--radius);
  color:var(--gold); font-size:13px; line-height:1; cursor:pointer;
  align-items:center; justify-content:center;
}
.side-close:hover{ border-color:var(--gold); background:rgba(197,165,90,.12); }
@media (max-width:900px){ .side-close{ display:flex; } }
.side-link{
  display:flex; align-items:center; gap:12px; width:100%; text-align:left;
  padding:11px 12px; border-radius:var(--radius); color:rgba(245,243,238,.82);
  transition:background .14s, color .14s; cursor:pointer;
  border-left:2px solid transparent;
}
.side-link:hover{ background:rgba(245,243,238,.06); color:#fff; }
.side-link.on{
  background:rgba(197,165,90,.14); color:#fff;
  border-left-color:var(--gold);
}
.side-ico{
  width:26px; height:26px; flex:none; border-radius:5px;
  display:flex; align-items:center; justify-content:center;
  background:rgba(245,243,238,.08); color:var(--gold); font-size:13px;
}
.side-link.on .side-ico{ background:var(--gold); color:var(--olive-darker); }
.side-link-txt{ display:flex; flex-direction:column; gap:1px; min-width:0; }
.side-link-label{ font-size:13.5px; font-weight:600; letter-spacing:-0.005em; }
.side-link-sub{
  font-family:var(--font-mono); font-size:9px; letter-spacing:0.1em;
  text-transform:uppercase; color:rgba(245,243,238,.45);
}
.side-link.on .side-link-sub{ color:rgba(197,165,90,.85); }
.side-foot{
  padding:14px; border-top:1px solid rgba(245,243,238,.1);
  display:flex; flex-direction:column; gap:10px;
}
.side-who-name{ font-size:13px; font-weight:600; color:#fff; }
.side-who-mail{
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.06em;
  color:rgba(245,243,238,.5); margin-top:2px; word-break:break-all;
}
.side-signout{
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em;
  text-transform:uppercase; color:rgba(245,243,238,.7); cursor:pointer;
  border:1px solid rgba(245,243,238,.18); border-radius:var(--radius);
  padding:8px; transition:all .14s; text-align:center;
}
.side-signout:hover{ border-color:var(--danger); color:#ff9a9a; }

.side-scrim{
  position:fixed; inset:0; z-index:55; background:rgba(10,10,8,.5);
  opacity:0; pointer-events:none; transition:opacity .2s;
}
.side-scrim.show{ opacity:1; pointer-events:auto; }

.ham{
  position:fixed; top:9px; right:14px; z-index:60;
  width:42px; height:42px; border-radius:var(--radius);
  background:var(--ink); border:1px solid var(--gold-line);
  display:none; flex-direction:column; align-items:center; justify-content:center; gap:4px;
}
.ham span{ display:block; width:18px; height:2px; background:var(--gold); border-radius:2px; }

@media (max-width:900px){
  .sidebar{
    top:0; z-index:65;
    transform:translateX(-100%); transition:transform .22s ease;
    box-shadow:0 0 40px rgba(0,0,0,.4);
  }
  .sidebar.open{ transform:translateX(0); }
  .ham{ display:flex !important; }
}
@media (min-width:901px){
  .side-scrim{ display:none; }
}

/* ============ Card primitive ============ */
.card{
  background:#fff; border:1px solid var(--olive-line);
  border-radius:var(--radius); box-shadow:var(--shadow-card);
}
.card-paper{background:var(--paper-soft); border:1px solid var(--olive-line); border-radius:var(--radius);}
.card-olive{background:var(--olive); color:#fff; border:1px solid var(--olive-darker); border-radius:var(--radius);}
.card-pad{padding:22px;}
.card-pad-sm{padding:14px 16px;}
@media (max-width:640px){ .card-pad{padding:16px;} }

/* ============ Button ============ */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  height:38px; padding:0 16px; border-radius:var(--radius);
  border:1px solid transparent; font-weight:500; font-size:13px;
  letter-spacing:0.005em; white-space:nowrap;
  transition:background .15s, border-color .15s, color .15s, transform .05s;
}
.btn:active{transform:translateY(1px);}
.btn:disabled{opacity:.5; cursor:not-allowed;}
.btn-primary{background:var(--olive); color:#fff; border-color:var(--olive-dark);}
.btn-primary:hover:not(:disabled){background:var(--olive-dark);}
.btn-ghost{background:transparent; color:var(--ink); border-color:var(--olive-line);}
.btn-ghost:hover:not(:disabled){background:#fff;}
.btn-gold{background:var(--gold); color:var(--olive-darker); border-color:var(--gold-line);}
.btn-gold:hover:not(:disabled){background:#B8985A;}
.btn-dark{background:var(--ink); color:var(--paper); border-color:var(--ink);}
.btn-dark:hover:not(:disabled){background:#000;}
.btn-danger-ghost{background:transparent; color:var(--danger); border-color:var(--danger);}
.btn-sm{height:30px; padding:0 11px; font-size:12px;}
.btn-lg{height:46px; padding:0 22px; font-size:14px;}
.btn-block{width:100%;}
.btn-mono{
  font-family:var(--font-mono); text-transform:uppercase;
  letter-spacing:var(--tracking-md); font-size:11px;
}

/* ============ Inputs ============ */
.field{display:flex; flex-direction:column; gap:6px;}
.field-row{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
@media (max-width:640px){ .field-row{grid-template-columns:1fr;} }
.label{
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--ink-3); font-weight:500;
}
.input, .select, .textarea{
  width:100%; background:#fff; border:1px solid var(--olive-line);
  border-radius:var(--radius); padding:10px 12px; font-size:14px;
  color:var(--ink); transition:border-color .12s, box-shadow .12s;
}
.input:focus, .select:focus, .textarea:focus{
  outline:none; border-color:var(--olive);
  box-shadow:0 0 0 3px rgba(74,93,35,.12);
}
.textarea{min-height:96px; resize:vertical; line-height:1.55;}
.select{appearance:none;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%235A5A56' stroke-width='1.4' fill='none' stroke-linecap='round'/></svg>");
  background-repeat:no-repeat; background-position:right 12px center;
  padding-right:32px;
}
.hint{font-size:12px; color:var(--ink-3);}
.err{font-size:12px; color:var(--danger); font-weight:500;}

.check-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px;}
.check{
  display:flex; align-items:center; gap:8px; padding:9px 11px;
  border:1px solid var(--olive-line); border-radius:var(--radius);
  background:#fff; cursor:pointer; user-select:none;
  font-size:13px; transition:background .12s, border-color .12s;
}
.check:hover{background:var(--paper-soft);}
.check input{accent-color:var(--olive); width:14px; height:14px; flex:none;}
.check.on{background:var(--olive-soft); border-color:var(--olive); color:var(--olive-darker); font-weight:500;}

.radio-row{display:flex; gap:8px; flex-wrap:wrap;}
.radio-pill{
  padding:8px 14px; border:1px solid var(--olive-line); border-radius:999px;
  background:#fff; font-size:13px; cursor:pointer; transition:all .12s;
}
.radio-pill.on{background:var(--ink); color:var(--paper); border-color:var(--ink);}

/* ============ Login ============ */
.login-wrap{
  min-height:calc(100vh - 80px);
  display:flex; align-items:center; justify-content:center;
  padding:40px 20px;
}
.login-card{
  width:100%; max-width:420px;
  background:#fff; border:1px solid var(--olive-line);
  border-radius:var(--radius-lg);
  overflow:hidden;
  box-shadow:var(--shadow-pop);
}
.login-head{
  background:#fff; color:var(--ink);
  padding:22px 26px 20px;
  border-bottom:1px solid var(--olive-line);
  box-shadow:inset 0 -3px 0 var(--gold);
}
.login-head .login-logo{
  height:46px; width:auto; display:block; margin-bottom:14px;
}
.login-head .eyebrow{color:var(--olive);}
.login-head h1{
  margin:6px 0 0; font-size:20px; font-weight:700; letter-spacing:-0.01em;
}
.login-body{padding:24px 26px 26px; display:flex; flex-direction:column; gap:14px;}
.login-foot{
  border-top:1px solid var(--olive-line); background:var(--paper-soft);
  padding:14px 26px; text-align:center; font-size:12.5px; color:var(--ink-3);
}
.login-toggle{
  background:none; border:none; color:var(--olive); font-weight:600;
  font-size:12.5px; cursor:pointer; padding:0; margin-left:4px;
}
.login-toggle:hover{text-decoration:underline;}

/* ============ PIQ wizard ============ */
.wizard-head{
  display:flex; align-items:flex-end; justify-content:space-between;
  gap:16px; margin-bottom:18px; flex-wrap:wrap;
}
.wizard-step-pill{
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.16em;
  text-transform:uppercase; color:var(--olive);
  border:1px solid var(--olive-line); background:#fff;
  padding:5px 10px; border-radius:2px;
}
.progress{
  display:flex; gap:6px; margin-top:14px;
}
.progress-seg{
  flex:1; height:6px; border-radius:2px;
  background:var(--paper-deep); border:1px solid var(--olive-line);
  position:relative; overflow:hidden;
}
.progress-seg.done{background:var(--olive); border-color:var(--olive-dark);}
.progress-seg.cur{
  background:repeating-linear-gradient(45deg,var(--gold) 0 6px, var(--gold-soft) 6px 12px);
  border-color:var(--gold-line);
}
.progress-labels{
  display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:8px;
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--ink-4);
}
.progress-labels span.cur{color:var(--olive); font-weight:600;}
.progress-labels span.done{color:var(--ink-3);}
@media (max-width:560px){
  .progress-labels{display:none;}
}

.section-title{
  display:flex; align-items:center; gap:10px;
  font-family:var(--font-mono); font-size:11px; letter-spacing:0.18em;
  text-transform:uppercase; color:var(--olive);
  margin:0 0 14px;
}
.section-title::before{
  content:""; width:18px; height:1px; background:var(--olive);
}
.fields-stack{display:flex; flex-direction:column; gap:14px;}
.wizard-foot{
  display:flex; justify-content:space-between; gap:10px; margin-top:22px;
  padding-top:18px; border-top:1px dashed var(--olive-line);
}

/* ============ Dashboard ============ */
.dash-grid{
  display:grid; grid-template-columns:1fr 300px; gap:24px;
  align-items:start;
}
@media (max-width:900px){ .dash-grid{grid-template-columns:1fr;} }

.dash-head{
  display:flex; align-items:flex-end; justify-content:space-between;
  gap:14px; flex-wrap:wrap; margin-bottom:6px;
}
.dash-meta{
  display:flex; gap:18px; flex-wrap:wrap;
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--ink-3); margin-top:6px;
}
.dash-meta b{color:var(--ink); font-weight:600;}

.cat-group{margin-top:22px;}
.cat-head{
  display:flex; align-items:center; gap:12px; margin-bottom:10px;
  padding-bottom:8px; border-bottom:1px solid var(--olive-line);
}
.cat-head h3{
  margin:0; font-size:12px; font-weight:700; letter-spacing:var(--tracking-hd);
  text-transform:uppercase; color:var(--ink);
}
.cat-count{
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--ink-4); margin-left:auto;
}

.q-card{
  background:#fff; border:1px solid var(--olive-line);
  border-radius:var(--radius); padding:14px 16px;
  display:flex; flex-direction:column; gap:10px;
  margin-bottom:10px;
  transition:border-color .12s, box-shadow .12s;
  position:relative;
}
.q-card:hover{border-color:var(--olive-line-strong, #9CA084); box-shadow:var(--shadow-card);}
.q-card.done{background:var(--paper-soft); border-color:var(--olive-line);}
.q-card-top{
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
}
.q-id{
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em;
  color:var(--ink-4);
}
.q-badge{
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.16em;
  text-transform:uppercase; padding:3px 7px; border-radius:2px;
  border:1px solid var(--olive-line); background:var(--paper);
  color:var(--ink-3);
}
.q-badge.diff-easy{background:#EFF4E6; color:#3B5A1C; border-color:#B8C99A;}
.q-badge.diff-medium{background:#FFF6E0; color:#8A6A1A; border-color:var(--gold-line);}
.q-badge.diff-hard{background:#FBE6E6; color:#8B1A1A; border-color:#D9A8A8;}
.q-badge.cat{background:#fff;}
.q-check{
  margin-left:auto; width:22px; height:22px; border-radius:50%;
  background:var(--olive); color:#fff;
  display:none; align-items:center; justify-content:center;
  font-size:12px;
}
.q-card.done .q-check{display:flex;}
.q-text{
  font-size:14.5px; line-height:1.5; color:var(--ink); margin:0;
}
.q-actions{display:flex; gap:8px; justify-content:flex-end;}

/* ============ Sidebar stats ============ */
.stat-card{padding:18px;}
.stat-row{
  display:flex; justify-content:space-between; align-items:baseline;
  padding:9px 0; border-bottom:1px dashed var(--olive-line);
  font-size:13px;
}
.stat-row:last-of-type{border-bottom:none;}
.stat-row .k{
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--ink-3);
}
.stat-row .v{font-weight:700; font-size:16px; color:var(--ink);}

.cat-bar{margin-top:10px;}
.cat-bar-row{
  display:flex; justify-content:space-between; align-items:center;
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.1em;
  text-transform:uppercase; color:var(--ink-3); margin-bottom:5px;
}
.cat-bar-row b{color:var(--ink); font-weight:600;}
.bar{
  height:6px; background:var(--paper-deep); border-radius:2px;
  border:1px solid var(--olive-line); overflow:hidden; margin-bottom:10px;
}
.bar > i{
  display:block; height:100%; background:var(--olive); transition:width .4s;
}

/* ============ Leaderboard / Merit Order ============ */
/* --- Podium (top 3) --- */
.podium{
  display:flex; align-items:flex-end; justify-content:center; gap:18px;
  margin-top:26px; padding:24px 18px 0;
}
.pod-col{
  flex:1 1 0; max-width:240px;
  display:flex; flex-direction:column; align-items:center;
}
.pod-who{
  display:flex; flex-direction:column; align-items:center; gap:5px;
  text-align:center; margin-bottom:14px; width:100%;
}
.pod-medal{
  width:52px; height:52px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:20px; font-weight:700;
  color:#fff; margin-bottom:4px;

.pod-medal-gold{background:linear-gradient(150deg,#E2C879,#B8985A); color:#3A2E10; border:2px solid #EAD89B;}
.pod-medal-silver{background:linear-gradient(150deg,#DADAD2,#A9A9A0); color:#33332E; border:2px solid #ECECE6;}
.pod-medal-bronze{background:linear-gradient(150deg,#D4A877,#A87A4E); color:#3A2410; border:2px solid #E2BE97;}
.pod-col.pod-gold .pod-medal{width:62px; height:62px; font-size:26px;}
.pod-name{font-weight:700; font-size:15px; letter-spacing:-0.01em; color:var(--ink); line-height:1.2; text-wrap:balance;}
.pod-col.pod-gold .pod-name{font-size:17px;}
.pod-entry{
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.12em;

}
.pod-stat{font-size:13px; color:var(--ink-3); margin-top:2px;}

.pod-of{font-family:var(--font-mono); font-size:10px; color:var(--ink-4);}
.pod-pct{

}
.pod-base{

.pod-base-silver{height:112px; background:linear-gradient(180deg,#ECECE6,#DBDBD3); border-color:#BFBFB6;}
.pod-base-bronze{height:84px; background:linear-gradient(180deg,#EAD9C6,#DCC2A6); border-color:#C9A985;}

}
.pod-col.pod-gold .pod-rank-num{font-size:42px; color:rgba(58,46,16,.32);}
.pod-me .pod-base{box-shadow:inset 0 -4px 0 var(--olive);}

.pod-yours{
  display:flex; align-items:center; gap:14px; flex-wrap:wrap;
  margin-top:22px; padding:13px 18px;

}
.pod-yours-rank{
  font-family:var(--font-mono); font-size:18px; font-weight:700; color:var(--olive-darker);
}
.pod-yours-txt{font-size:14px; color:var(--ink-2);}
.pod-yours-stat{
  margin-left:auto; font-family:var(--font-mono); font-size:11px;
  letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-3);
}
.pod-cta{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  width:100%; margin-top:22px; padding:15px 20px;

}
.pod-cta:hover{background:#000;}
.pod-cta-meta{color:var(--gold);}
@media (max-width:560px){
  .podium{gap:8px; padding:16px 0 0;}
  .pod-medal{width:42px; height:42px; font-size:16px;}
  .pod-col.pod-gold .pod-medal{width:50px; height:50px; font-size:20px;}

  .pod-col.pod-gold .pod-name{font-size:14px;}
  .pod-base-gold{height:110px;} .pod-base-silver{height:84px;} .pod-base-bronze{height:64px;}
}

/* --- Full standings table --- */
.lb-toolbar{
  display:flex; align-items:center; justify-content:space-between;

  background:var(--paper-soft);
}
.lb-back{
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--olive); font-weight:600; cursor:pointer;
}
.lb-back:hover{color:var(--olive-dark);}
.lb-toolbar-count{
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--ink-4);
}
.lb-card{padding:0; overflow:hidden;}
.lb-row{
  display:grid;
  grid-template-columns:64px minmax(160px,1.6fr) 78px 96px minmax(120px,1fr);

}
.lb-row:last-child{border-bottom:none;}
.lb-header{
  background:var(--ink); color:var(--paper);
  border-bottom:2px solid var(--gold);
}
.lb-header span{
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.16em;
  text-transform:uppercase; color:var(--gold);
}
.lb-rank{display:flex; align-items:center;}
.lb-rank-num{
  font-family:var(--font-mono); font-size:14px; font-weight:600;
  color:var(--ink-3); width:30px; text-align:center;
}
.lb-medal{
  width:30px; height:30px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-mono); font-size:13px; font-weight:700;
  color:#fff; box-shadow:0 1px 3px rgba(26,26,26,.2);
}
.lb-medal-gold{background:linear-gradient(150deg,#D9BD6B,#B8985A); color:#3A2E10;}
.lb-medal-silver{background:linear-gradient(150deg,#CFCFC6,#A9A9A0); color:#33332E;}
.lb-medal-bronze{background:linear-gradient(150deg,#C89A6B,#A87A4E); color:#3A2410;}

.lb-name{display:flex; align-items:center; gap:8px; flex-wrap:wrap; min-width:0;}
.lb-name-txt{font-weight:600; font-size:14.5px; color:var(--ink); letter-spacing:-0.005em;}
.lb-service{
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--ink-4);
}
.lb-you{
  font-family:var(--font-mono); font-size:9px; letter-spacing:0.14em;
  text-transform:uppercase; font-weight:600;
  background:var(--olive); color:#fff; padding:2px 6px; border-radius:2px;
}
.lb-entry-badge{
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em;
  text-transform:uppercase; font-weight:600;
  border:1px solid var(--olive-line); background:var(--paper);
  color:var(--olive-darker); padding:3px 8px; border-radius:2px;
}
.lb-prac{font-size:15px; color:var(--ink-3);}
.lb-prac b{font-size:18px; font-weight:700; color:var(--ink);}
.lb-of{font-family:var(--font-mono); font-size:11px; color:var(--ink-4);}
.lb-pct{display:flex; align-items:center; gap:10px;}
.lb-bar{
  flex:1; height:6px; background:var(--paper-deep); border-radius:2px;
  border:1px solid var(--olive-line); overflow:hidden; min-width:60px;
}
.lb-bar > i{display:block; height:100%; background:var(--olive); transition:width .4s;}
.lb-pct-num{
  font-family:var(--font-mono); font-size:11px; font-weight:600;
  color:var(--ink-2); width:38px; text-align:right;
}

/* medal row tints */
.lb-gold{background:linear-gradient(90deg, rgba(197,165,90,.14), rgba(197,165,90,.02));}
.lb-silver{background:linear-gradient(90deg, rgba(150,150,140,.12), transparent);}
.lb-bronze{background:linear-gradient(90deg, rgba(168,122,78,.12), transparent);}
.lb-me{
  box-shadow:inset 3px 0 0 var(--olive);
  background:linear-gradient(90deg, rgba(74,93,35,.10), transparent);
}
.lb-me.lb-gold{background:linear-gradient(90deg, rgba(197,165,90,.18), rgba(74,93,35,.05));}

@media (max-width:640px){
  .lb-row{
    grid-template-columns:44px 1fr 70px;
    grid-template-areas:
      "rank name entry"
      "rank prac pct";
    gap:4px 10px; padding:12px 14px;
  }
  .lb-header{display:none;}
  .lb-rank{grid-area:rank;}
  .lb-name{grid-area:name;}
  .lb-entry{grid-area:entry; justify-self:end;}
  .lb-prac{grid-area:prac; font-size:13px;}
  .lb-prac b{font-size:15px;}
  .lb-pct{grid-area:pct;}
  .lb-pct-num{width:auto;}
}

/* ============ Daily PT ============ */
.pt-tabs{
  display:flex; align-items:center; gap:8px; margin:18px 0 0;
  border-bottom:1px solid var(--olive-line); padding-bottom:0; flex-wrap:wrap;
}
.pt-tab{
  font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em;
  text-transform:uppercase; font-weight:600; color:var(--ink-3);
  padding:10px 16px; border-bottom:2px solid transparent; margin-bottom:-1px;
  cursor:pointer;
}
.pt-tab:hover{color:var(--ink);}
.pt-tab.on{color:var(--olive); border-bottom-color:var(--olive);}
.pt-tab-edit{
  margin-left:auto; font-family:var(--font-mono); font-size:10px;
  letter-spacing:0.12em; text-transform:uppercase; color:var(--ink-4);
  cursor:pointer; padding:10px 4px;
}
.pt-tab-edit:hover{color:var(--olive);}

.pt-streak{
  display:grid; grid-template-columns:repeat(3,1fr); gap:1px;
  background:var(--olive-line); border:1px solid var(--olive-line);
  border-radius:var(--radius); overflow:hidden; margin-top:20px;
}
.pt-streak-cell{
  background:var(--ink); color:var(--paper);
  padding:16px 14px; text-align:center;
}
.pt-streak-flame{background:var(--olive);}
.pt-streak-num{font-family:var(--font-mono); font-size:30px; font-weight:700; line-height:1; color:var(--gold);}
.pt-streak-flame .pt-streak-num{color:#fff;}
.pt-streak-icon{font-size:26px; line-height:1;}
.pt-streak-lbl{
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.16em;
  text-transform:uppercase; color:rgba(245,243,238,.7); margin-top:7px;
}

.pt-order-head{
  display:flex; align-items:baseline; justify-content:space-between;
  gap:12px; margin-top:24px; flex-wrap:wrap;
}
.pt-order-date{
  font-family:var(--font-mono); font-size:11px; letter-spacing:0.16em;
  text-transform:uppercase; color:var(--ink); font-weight:600;
}

.pt-progress{margin-top:12px;}
.pt-progress-row{
  display:flex; justify-content:space-between; gap:10px; margin-bottom:6px;
}
.pt-progress-lbl{
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.12em;
  text-transform:uppercase; color:var(--ink-3);
}
.pt-progress-bar{
  height:8px; background:var(--paper-deep); border:1px solid var(--olive-line);
  border-radius:2px; overflow:hidden;
}
.pt-progress-bar > i{display:block; height:100%; background:var(--olive); transition:width .4s;}

.pt-list{display:flex; flex-direction:column; gap:10px; margin-top:18px;}
.ex-card{
  display:flex; gap:14px; padding:16px;
  background:#fff; border:1px solid var(--olive-line); border-radius:var(--radius);
  transition:border-color .12s, background .15s;
}
.ex-card.ex-done{background:var(--paper-soft); border-color:var(--olive-line);}
.ex-left{display:flex; flex-direction:column; align-items:center; gap:10px; flex:none;}
.ex-num{
  font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em;
  color:var(--ink-4); font-weight:600;
}
.ex-check{
  width:34px; height:34px; border-radius:6px;
  border:2px solid var(--olive-line); background:#fff;
  display:flex; align-items:center; justify-content:center;
  font-size:18px; color:#fff; transition:all .15s; cursor:pointer;
}
.ex-check:hover{border-color:var(--olive);}
.ex-check.on{background:var(--olive); border-color:var(--olive-dark);}

.ex-body{flex:1; min-width:0;}
.ex-top{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
.ex-name{margin:0; font-size:16px; font-weight:700; letter-spacing:-0.01em; color:var(--ink);}
.ex-card.ex-done .ex-name{color:var(--ink-3);}
.ex-type{
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.14em;
  text-transform:uppercase; font-weight:600; padding:3px 8px; border-radius:2px;
  border:1px solid var(--olive-line);
}
.ex-type-upper-body{background:#EFF4E6; color:#3B5A1C; border-color:#B8C99A;}
.ex-type-lower-body{background:#FBF0E0; color:#8A5A1A; border-color:var(--gold-line);}
.ex-type-core{background:#E8EEF4; color:#1C415A; border-color:#A0B6C9;}
.ex-type-cardio{background:#FBE6E6; color:#8B1A1A; border-color:#D9A8A8;}
.ex-type-conditioning{background:var(--paper); color:var(--ink-3);}
.ex-presc{
  font-family:var(--font-mono); font-size:15px; font-weight:600;
  color:var(--olive-darker); margin-top:8px; letter-spacing:0.02em;
}
.ex-notes{font-size:13.5px; line-height:1.5; color:var(--ink-2); margin-top:8px;}
.ex-gto{
  display:flex; align-items:flex-start; gap:8px; margin-top:10px;
  font-size:12.5px; line-height:1.45; color:var(--ink-3);
}
.ex-gto-lbl{
  font-family:var(--font-mono); font-size:9px; letter-spacing:0.14em;
  text-transform:uppercase; font-weight:700; color:var(--olive);
  border:1px solid var(--olive-line); background:var(--olive-soft);
  padding:2px 6px; border-radius:2px; flex:none; margin-top:1px;
}

.ex-run{
  display:flex; align-items:center; gap:12px; flex-wrap:wrap;
  margin-top:14px; padding-top:14px; border-top:1px dashed var(--olive-line);
}
.ex-run-btn{
  display:inline-flex; align-items:center; gap:6px;
  height:38px; padding:0 16px; border-radius:var(--radius);
  background:var(--ink); color:var(--paper);
  font-family:var(--font-mono); font-size:11px; letter-spacing:0.08em;
  text-transform:uppercase; font-weight:600; cursor:pointer;
  transition:background .15s;
}
.ex-run-btn:hover{background:#000;}
.ex-run-btn-sm{height:30px; padding:0 11px; background:transparent; color:var(--olive); border:1px solid var(--olive-line);}
.ex-run-btn-sm:hover{background:var(--paper-soft);}
.ex-run-cam{font-size:14px;}
.ex-run-hint{font-size:11.5px; color:var(--ink-4);}
.ex-run-prog{
  font-family:var(--font-mono); font-size:11px; font-weight:700;
  margin-left:4px; color:var(--gold);
}
.ex-run-ok{
  font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em;
  text-transform:uppercase; font-weight:600; color:var(--success);
}
.ex-run-thumb{display:block; width:54px; height:54px; border-radius:var(--radius); overflow:hidden; border:1px solid var(--olive-line);}
.ex-run-thumb img{width:100%; height:100%; object-fit:cover; display:block;}

/* completion stamp / seal */
.pt-stamp{
  display:flex; align-items:center; gap:18px; margin-top:20px;
  padding:18px 20px; background:var(--olive); color:#fff;
  border:1px solid var(--olive-darker); border-radius:var(--radius);
  box-shadow:inset 0 -3px 0 var(--gold);
}
.pt-stamp-seal{
  width:88px; height:88px; flex:none; border-radius:50%;
  border:3px double var(--gold); color:var(--gold);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transform:rotate(-8deg);
}
.pt-stamp-star{font-size:20px; line-height:1;}
.pt-stamp-txt{
  font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em;
  font-weight:700; text-align:center; white-space:pre; line-height:1.25; margin-top:3px;
}
.pt-stamp-h{font-size:17px; font-weight:700; letter-spacing:-0.01em;}
.pt-stamp-sub{font-size:13px; color:rgba(245,243,238,.82); margin-top:5px; line-height:1.5; max-width:420px;}

/* PT leaderboard full table */
.pt-lb-row{
  grid-template-columns:56px minmax(120px,1.4fr) 70px 84px 70px 100px !important;
}
.pt-lb-row .lb-medal{width:28px; height:28px; font-size:12px;}
.pt-lb-row b{font-size:17px; font-weight:700; color:var(--ink);}
.pt-lb-row span[class^="ptlb-c"]{display:flex; align-items:center; gap:6px; min-width:0;}
.lb-header span[class^="ptlb-c"]{
  font-family:var(--font-mono); font-size:9.5px; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--gold);
}
.ptlb-c4{font-family:var(--font-mono); font-size:12px; color:var(--ink-2);}
.ptlb-c5{font-family:var(--font-mono); font-size:11px; color:var(--ink-4);}
@media (max-width:640px){
  .pt-streak-num{font-size:24px;}
  .pt-lb-row{
    grid-template-columns:40px 1fr 60px 56px !important;
  }
  .ptlb-c5{display:none !important;}
  .ptlb-c4{font-size:11px;}
  .ex-name{font-size:15px;}
}

/* ============ OIR Practice ============ */
.oir-load-card{
  margin-top:18px; padding:48px 28px;
  background:var(--ink); color:var(--paper);
  border-radius:var(--radius); box-shadow:inset 0 -3px 0 var(--gold);
  display:flex; flex-direction:column; align-items:center; text-align:center; gap:18px;
  min-height:300px; justify-content:center;
}
.oir-load-spinner{
  width:52px; height:52px; border-radius:50%;
  border:3px solid rgba(197,165,90,.22); border-top-color:var(--gold);
  animation:spin 1s linear infinite;
}
.oir-prog-track{
  width:100%; max-width:480px; height:10px; border-radius:999px;
  background:rgba(245,243,238,.12); overflow:hidden;
}
.oir-prog-fill{
  height:100%; width:0%; border-radius:999px;
  background:linear-gradient(90deg, #B8985A, var(--gold));
}
.oir-prog-pct{
  font-family:var(--font-mono); font-size:14px; font-weight:700;
  letter-spacing:0.08em; color:var(--gold);
}
.oir-load-title{
  font-family:var(--font-mono); font-size:12px; letter-spacing:0.16em;
  text-transform:uppercase; color:var(--gold); font-weight:600;
}
.oir-tip{
  font-size:15px; line-height:1.55; font-style:italic;
  color:rgba(245,243,238,.7); max-width:420px;
  transition:opacity .32s ease; min-height:46px;
  display:flex; align-items:center;
}
.oir-tip.fade-out{ opacity:0; }
.oir-ready-card{ gap:10px; }
.oir-ready-lbl{
  font-family:var(--font-mono); font-size:12px; letter-spacing:0.24em;
  text-transform:uppercase; color:rgba(245,243,238,.6); font-weight:600;
}
.oir-ready-num{
  font-family:var(--font-mono); font-size:80px; font-weight:700; line-height:1;
  color:var(--gold); animation:oirPop .9s ease-out;
}
@keyframes oirPop{
  0%{ transform:scale(.55); opacity:0; }
  35%{ transform:scale(1.08); opacity:1; }
  100%{ transform:scale(1); opacity:1; }
}
.oir-ready-sub{ font-size:13px; color:rgba(245,243,238,.55); }

.oir-count-row{
  display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-top:20px;
}
.oir-count-lbl{
  font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--ink-3); font-weight:500;
}
.oir-count-pills{ display:flex; gap:8px; }
.oir-count-pill{
  font-family:var(--font-mono); font-size:12px; letter-spacing:0.06em;
  font-weight:600; padding:9px 18px; border-radius:999px;
  border:1px solid var(--olive-line); background:#fff; color:var(--ink-2);
  cursor:pointer; transition:all .14s;
}
.oir-count-pill:hover{ background:var(--paper-soft); }
.oir-count-pill.on{
  background:var(--gold); color:var(--olive-darker);
  border-color:var(--gold-line); box-shadow:0 1px 4px rgba(197,165,90,.3);
}
.oir-count-pill{ display:inline-flex; flex-direction:column; align-items:center; gap:1px; line-height:1.2; }
.oir-pill-sub{ font-size:8.5px; letter-spacing:0.1em; opacity:.7; font-weight:500; }
.oir-type-sub{
  font-size:12.5px; color:var(--ink-3); margin-top:8px;
  font-style:italic;
}
.oir-cta-card{
  display:flex; align-items:center; justify-content:space-between; gap:18px;
  flex-wrap:wrap; padding:22px 24px;
  background:var(--ink); color:var(--paper); border-radius:var(--radius);
  box-shadow:inset 0 -3px 0 var(--gold);
}
.oir-cta-eyebrow{
  font-family:var(--font-mono); font-size:10px; letter-spacing:0.16em;
  text-transform:uppercase; color:var(--gold);
}
.oir-cta-title{ font-size:20px; font-weight:700; letter-spacing:-0.01em; margin-top:6px; }
.oir-cta-sub{ font-size:13px; color:rgba(245,243,238,.75); margin-top:6px; max-width:440px; line-height:1.5; }

.oir-tbl{ overflow:hidden; }
.oir-tr{

<script>
/* =========================================================

const firebaseConfig = {

  measurementId: "G-FHCCXCSSZ6"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();
const fns  = firebase.functions(); // default region us-central1
const storage = firebase.storage();
const FV   = firebase.firestore.FieldValue;

// AI: prefer Cloud Function (works on any hosted domain),
// fall back to window.claude.complete inside the Claude artifact viewer.
const _aiCompleteFn = fns.httpsCallable("aiComplete");
async function aiComplete(promptOrObj, opts = {}) {
  let prompt;
  if (typeof promptOrObj === "string") prompt = promptOrObj;
  else if (promptOrObj && Array.isArray(promptOrObj.messages))
    prompt = promptOrObj.messages.map(m => m.content).join("\n\n");
  else throw new Error("aiComplete: bad prompt");

  // 1) Cloud Function path (production hosting)
  if (auth.currentUser) {
    try {
      const res = await _aiCompleteFn({ prompt, maxTokens: opts.maxTokens || 2000 });
      if (res && res.data && typeof res.data.text === "string") return res.data.text;
    } catch (e) {
      // If the function isn't deployed yet, fall through to the artifact helper.
      const code = e && e.code;
      const isMissing = code === "functions/not-found" || code === "functions/internal" || code === "not-found";
      if (!isMissing && typeof window.claude?.complete !== "function") throw e;
      console.warn("aiComplete: cloud function failed, falling back.", e);
    }
  }

  // 2) In-Claude fallback
  if (typeof window.claude?.complete === "function") {
    return await window.claude.complete(prompt);
  }
  throw new Error("No AI backend available. Deploy the aiComplete Cloud Function.");
}

// Firestore helpers — collections: profiles, questionSets, practice
async function loadProfile(uid){
  const snap = await db.collection('profiles').doc(uid).get();
  return snap.exists ? snap.data() : null;
}
async function saveProfile(uid, profile){
  await db.collection('profiles').doc(uid).set(
    { ...profile, updatedAt: FV.serverTimestamp() },
    { merge: true }
  );
}
async function loadQuestionSet(uid){
  const snap = await db.collection('questionSets').doc(uid).get();
  return snap.exists ? (snap.data().questions || []) : [];
}
async function saveQuestionSet(uid, questions){
  await db.collection('questionSets').doc(uid).set({
    questions,
    generatedAt: FV.serverTimestamp()
  });
}
async function loadPractice(uid){
  const qs = await db.collection('practice').where('uid','==',uid).get();
  const map = {};
  qs.forEach(d => {
    const x = d.data();
    map[x.questionId] = { answer: x.answer, feedback: x.feedback, rating: x.rating, ts: x.ts };
  });
  return map;
}
async function savePracticeItem(uid, questionId, payload){
  await db.collection('practice').doc(`${uid}_${questionId}`).set({
    uid,
    questionId,
    answer: payload.answer || "",
    feedback: payload.feedback || null,
    rating: payload.rating || "",
    ts: FV.serverTimestamp()
  });
}
async function clearPractice(uid){
  const snap = await db.collection('practice').where('uid','==',uid).get();
  const batch = db.batch();
  snap.forEach(d => batch.delete(d.ref));
  if (!snap.empty) await batch.commit();
}

// --- leaderboard (public stats only) ---
// Each user writes ONE doc: leaderboard/{uid}. No PIQ details — just merit data.
async function upsertLeaderboard(uid, data){
  if (!uid) return;
  try{
    await db.collection('leaderboard').doc(uid).set({
      uid,
      name: data.name || "Candidate",
      entryType: data.entryType || "—",
      service: data.service || "—",
      questionsPracticed: data.questionsPracticed || 0,
      totalQuestions: data.totalQuestions || 0,
      lastActive: FV.serverTimestamp(),
    }, { merge: true });
  } catch(e){ console.warn("leaderboard write failed", e); }
}
// Push the current user's standing using in-memory state.
async function syncMyStanding(){
  if (!state.uid || !state.profile) return;
  await upsertLeaderboard(state.uid, {
    name: state.profile.fullName || "Candidate",
    entryType: state.profile.entryType || "—",
    service: state.profile.service || "—",
    questionsPracticed: Object.keys(state.practice || {}).length,
    totalQuestions: state.questions.length,
  });
}
async function loadLeaderboard(){
  const snap = await db.collection('leaderboard').get();
  const rows = [];
  snap.forEach(d => rows.push(d.data()));
  // rank: most practiced first, then completion %, then name
  rows.sort((a,b) => {
    if ((b.questionsPracticed||0) !== (a.questionsPracticed||0)) return (b.questionsPracticed||0) - (a.questionsPracticed||0);
    const ap = a.totalQuestions ? a.questionsPracticed/a.totalQuestions : 0;
    const bp = b.totalQuestions ? b.questionsPracticed/b.totalQuestions : 0;
    if (bp !== ap) return bp - ap;
    return (a.name||"").localeCompare(b.name||"");
  });
  return rows;
}

/* =========================================================
   Daily PT — date utils + Firestore/Storage helpers
   ========================================================= */
function todayKey(d){
  d = d || new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function prettyDate(key){
  const [y,m,d] = key.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString(undefined, { weekday:"long", day:"numeric", month:"long", year:"numeric" });
}
function shiftDate(key, deltaDays){
  const [y,m,d] = key.split("-").map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate()+deltaDays);
  return todayKey(dt);
}
function monthKey(key){ return key.slice(0,7); } // YYYY-MM

// consecutive-day streak ending today or yesterday
function computeStreak(workouts){
  const done = new Set(workouts.filter(w => w.completedAll).map(w => w.date));
  if (done.size === 0) return 0;
  let streak = 0;
  let cursor = todayKey();
  // allow streak to count even if today not done yet (start from yesterday)
  if (!done.has(cursor)) cursor = shiftDate(cursor, -1);
  while (done.has(cursor)){
    streak++;
    cursor = shiftDate(cursor, -1);
  }
  return streak;
}
function countThisMonth(workouts){
  const mk = monthKey(todayKey());
  return workouts.filter(w => w.completedAll && monthKey(w.date) === mk).length;
}

// run screenshot → Firebase Storage runs/{uid}/{date}.jpg
// Downscale first (phone screenshots are huge) then upload with progress + timeout.
function resizeImage(file, maxDim=1400, quality=0.82){
  return new Promise((resolve, reject)=>{
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = ()=>{
      URL.revokeObjectURL(url);
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const w = Math.max(1, Math.round(img.width*scale));
      const h = Math.max(1, Math.round(img.height*scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(b => b ? resolve(b) : reject(new Error("Image compression failed.")), 'image/jpeg', quality);
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); reject(new Error("Could not read that image.")); };
    img.src = url;
  });
}
async function uploadRunScreenshot(uid, date, blob){
  const ref = storage.ref().child(`runs/${uid}/${date}.jpg`);
  const task = ref.put(blob, { contentType: "image/jpeg" });
  await new Promise((resolve, reject)=>{
    const to = setTimeout(()=> reject(new Error("Upload timed out. Your Storage bucket likely needs CORS configured — see DEPLOY.md.")), 40000);
    task.on('state_changed',
      (snap)=>{
        state.runProgress = snap.totalBytes ? Math.round(100*snap.bytesTransferred/snap.totalBytes) : 0;
        const lbl = document.querySelector('.ex-run-prog');
        if (lbl) lbl.textContent = state.runProgress + "%";
      },
      (err)=>{ clearTimeout(to); reject(err); },
      ()=>{ clearTimeout(to); resolve(); }
    );
  });
  return await ref.getDownloadURL();
}

const OIR_GRADE_LABEL = {
  1:"Outstanding", 2:"Above Average", 3:"Average", 4:"Below Average", 5:"Needs Serious Work"
};

const OIR_VERBAL_TOPICS = "Coding-Decoding, Blood Relations, Jumbled Words, Alphabet/Common Sense, Arithmetic (age/percentage/speed/profit), Analogies, Odd One Out, Synonyms/Antonyms, Direction Sense, One-Word Substitution";
const OIR_NONVERBAL_TOPICS = "Number/Figure Series, Odd Figure Out, Mirror/Water Images, Paper Folding, Hidden Figures, Figure Matrix, Dice/Cube";
const OIR_LIMITS = { 10: 240, 20: 480, 50: 1020 }; // seconds

function buildOirPrompt(count, type, idStart){
  const perTopic = count <= 10 ? "1 question" : count <= 25 ? "1-2 questions" : "3-4 questions";
  let topicsBlock, scope;
  if (type === "verbal"){
    topicsBlock = `- Verbal topics ONLY: ${OIR_VERBAL_TOPICS}`;
    scope = `ALL ${count} questions must be Verbal Reasoning. Every question's "type" must be "verbal".`;
  } else if (type === "non-verbal"){
    topicsBlock = `- Non-Verbal topics ONLY: ${OIR_NONVERBAL_TOPICS}`;
    scope = `ALL ${count} questions must be Non-Verbal Reasoning. Every question's "type" must be "non-verbal".`;
  } else {
    topicsBlock = `- Verbal topics: ${OIR_VERBAL_TOPICS}\n- Non-Verbal topics: ${OIR_NONVERBAL_TOPICS}`;
    scope = `Mix verbal and non-verbal questions roughly evenly.`;
  }
  const idLine = idStart && idStart > 1
    ? `Start question IDs from ${idStart} (i.e. ids ${idStart} to ${idStart + count - 1}).`
    : `Number question IDs from 1 to ${count}.`;
  return `Be concise. Keep all string fields under 120 characters.

Generate a mixed OIR (Officer Intelligence Rating) practice test for SSB aspirants. Generate exactly ${count} questions. ${scope} ${idLine} Scale the per-topic question count proportionally — use ${perTopic} from each topic below so the total comes to exactly ${count}:
${topicsBlock}

For non-verbal questions that require figures, describe the pattern clearly in text form so it can be rendered as a text/ASCII question. Vary the questions each time — do not repeat a fixed set.

Return ONLY a valid JSON array (no prose, no markdown fences). Each question object must have:
{
  "id": number,
  "type": "verbal" | "non-verbal",
  "topic": string,
  "question": string,
  "options": ["A) ...", "B) ...", "C) ...", "D) ..."],
  "correct": "A" | "B" | "C" | "D",
  "explanation": "max 1 line — why the answer is correct",
  "approach": "max 1 line — the trick/method to solve this question TYPE"
}`;
}

// One generation call with a single retry if it returns too few questions.
async function oirCall(count, type, idStart, minOk){
  const prompt = buildOirPrompt(count, type, idStart);
  const maxTokens = count > 25 ? 8000 : 4500;
  for (let attempt = 0; attempt < 2; attempt++){
    let parsed = null;
    try{
      const raw = await aiComplete(prompt, { maxTokens });
      parsed = parseOir(raw);
    } catch(e){ parsed = null; }
    if (parsed && parsed.length >= minOk) return parsed;
  }
  return null;
}

async function generateOirTest(n, type){
  const N = [10,20,50].includes(n) ? n : 20;

  // 50Q: split into two 25Q calls (more reliable than one huge response), then merge.
  if (N === 50){
    const [qs1, qs2] = await Promise.all([
      oirCall(25, type, 1, 10),
      oirCall(25, type, 26, 10),
    ]);
    if (!qs1 || !qs2) return null;
    const qs = [...qs1, ...qs2];
    // normalize ids to a clean 1..50 sequence regardless of what the model returned
    return qs.map((q, i) => ({ ...q, id: i + 1 }));
  }

  // 10Q / 20Q: single call (unchanged behaviour).
  return await oirCall(N, type, 1, Math.min(5, N));
}
function parseOir(raw){
  if (!raw) return null;
  const i = raw.indexOf("["); const j = raw.lastIndexOf("]");
  if (i < 0 || j < 0 || j <= i) return null;
  try{
    const arr = JSON.parse(raw.slice(i, j+1));
    if (!Array.isArray(arr) || !arr.length) return null;
    return arr.map((q, idx) => ({
      id: q.id ?? (idx+1),
      type: /non/i.test(q.type||"") ? "non-verbal" : "verbal",
      topic: String(q.topic || "General").trim(),
      question: String(q.question || "").trim(),
      options: Array.isArray(q.options) ? q.options.map(o => String(o)) : [],
      correct: normalizeOpt(q.correct),
      explanation: String(q.explanation || "").trim(),
      approach: String(q.approach || "").trim(),
    })).filter(q => q.question && q.options.length === 4);
  } catch(e){ return null; }
}
function normalizeOpt(c){
  const s = (c||"").toString().trim().toUpperCase();
  const m = s.match(/[ABCD]/);
  return m ? m[0] : "A";
}
// letter for an option index
function optLetter(i){ return ["A","B","C","D"][i] || "A"; }

async function generateWorkout(date, didYesterday){
  const fp = state.profile.fitnessProfile || {};
  const sys = `You are a military fitness coach preparing SSB candidates for GTO obstacles. Based on the candidate's fitness profile, generate today's workout.

Rules:
- 5-6 exercises total
- Mix of: upper body (pull-ups, push-ups, dead hangs for rope climbing prep), core (planks, leg raises for balance), lower body (squats, lunges, box jumps for obstacle jumping), and cardio (running with specific distance and pace target)
- One exercise must always be running with a specific distance and target pace
- Scale difficulty to their current level (if they can only do 5 push-ups, don't prescribe 50)
- Progressive overload: ${didYesterday ? "they COMPLETED yesterday's workout — increase volume slightly today" : "they did not complete a workout yesterday — keep today's load steady, do not over-prescribe"}
- If they train at home: bodyweight exercises only. If gym: include pull-up bar, dumbbell exercises. If both: you may use either.
- Today's date is ${date}. Treat this date as a seed so the plan is deterministic for the day.

Return ONLY a JSON array (no prose, no markdown fences):
[{"id": 1, "name": "Push-ups", "sets": 3, "reps": 15, "type": "Upper Body", "notes": "Keep core tight, full range of motion", "gto_relevance": "Rope climbing & obstacle vaulting strength"}]
For running use: {"id": 6, "name": "Running", "sets": 1, "reps": 1, "type": "Cardio", "distance_km": 2.5, "target_pace": "6:00 min/km", "notes": "Maintain steady pace, don't stop", "gto_relevance": "Stamina for full GTO day"}`;

  const user = `CANDIDATE FITNESS PROFILE:\n${JSON.stringify(fp, null, 2)}\n\nSSB entry type: ${state.profile.entryType || "—"}. Generate today's PT order.`;

  const raw = await aiComplete(sys + "\n\n" + user, { maxTokens: 1500 });
  return parseWorkout(raw);
}
function parseWorkout(raw){
  if (!raw) return null;
  const i = raw.indexOf("["); const j = raw.lastIndexOf("]");
  if (i < 0 || j < 0 || j <= i) return null;
  try{
    const arr = JSON.parse(raw.slice(i, j+1));
    if (!Array.isArray(arr) || !arr.length) return null;
    return arr.map((e, idx) => {
      const type = normalizePtType(e.type);
      const isRun = /run/i.test(e.name||"") || (/cardio/i.test(type) && e.distance_km != null);
      const ex = {
        id: e.id ?? (idx+1),
        name: String(e.name || "Exercise").trim(),
        sets: Number(e.sets) || 1,
        reps: Number(e.reps) || 1,
        type,
        notes: String(e.notes || "").trim(),
        gto_relevance: String(e.gto_relevance || "").trim(),
        isRun: !!isRun,
      };
      // only attach optional run fields when present (Firestore rejects undefined)
      if (e.distance_km != null && e.distance_km !== "") ex.distance_km = Number(e.distance_km);
      if (e.target_pace) ex.target_pace = String(e.target_pace).trim();
      return ex;
    });
  } catch(e){ return null; }
}

// Firestore rejects `undefined`. Strip it recursively before any write.
function stripUndefined(v){
  if (Array.isArray(v)) return v.map(stripUndefined);
  if (v && typeof v === "object"){
    const out = {};
    for (const [k, val] of Object.entries(v)){
      if (val === undefined) continue;
      out[k] = stripUndefined(val);
    }
    return out;
  }
  return v;
}
function normalizePtType(t){
  const s = (t||"").toString().trim().toLowerCase();
  if (s.includes("upper")) return "Upper Body";
  if (s.includes("lower") || s.includes("leg")) return "Lower Body";
  if (s.includes("core")) return "Core";
  if (s.includes("cardio") || s.includes("run")) return "Cardio";
  return "Conditioning";
}

function humanizeAuthError(e){
  const c = (e && e.code) || "";
  if (c === "auth/email-already-in-use") return "An account with this email already exists. Try signing in.";
  if (c === "auth/invalid-credential" || c === "auth/wrong-password" || c === "auth/user-not-found") return "Incorrect email or password.";
  if (c === "auth/weak-password") return "Password must be at least 6 characters.";
  if (c === "auth/invalid-email") return "Enter a valid email address.";
  if (c === "auth/network-request-failed") return "Network error. Check your connection.";
  if (c === "auth/too-many-requests") return "Too many attempts. Wait a minute and try again.";
  return (e && e.message) || "Authentication failed.";
}

function el(tag, attrs={}, ...children){
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs||{})){
    if (k === "class") e.className = v;
    else if (k === "style" && typeof v === "object") Object.assign(e.style, v);
    else if (k.startsWith("on") && typeof v === "function") e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "html") e.innerHTML = v;
    else if (v === true) e.setAttribute(k, "");
    else if (v === false || v == null) {}
    else e.setAttribute(k, v);
  }
  for (const c of children.flat()){
    if (c == null || c === false) continue;
    if (typeof c === "string" || typeof c === "number") e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

async function handleAuth(email, pw){
  state.authError = "";
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ state.authError = "Enter a valid email address."; render(); return; }
  if (!pw || pw.length < 6){ state.authError = "Password must be at least 6 characters."; render(); return; }
  if (state.authBusy) return;
  state.authBusy = true; render();
  try{
    if (state.authMode === "signup"){
      await auth.createUserWithEmailAndPassword(email, pw);
    } else {
      await auth.signInWithEmailAndPassword(email, pw);
    }
    // onAuthStateChanged will load profile + route to next screen
  } catch(e){
    state.authBusy = false;
    state.authError = humanizeAuthError(e);
    render();
  }
}

}

function textareaBind(p, key, ph){
  const t = el("textarea", {class:"textarea", placeholder:ph||""});
  t.value = p[key] || "";
  t.addEventListener("input", e => p[key] = e.target.value);

function selectBind(p, key, options){
  const s = el("select", {class:"select"});
  for (const opt of options){
    const o = el("option", {value:opt}, opt);
    if ((p[key]||options[0]) === opt) o.selected = true;
    s.appendChild(o);
  }
  if (!p[key]) p[key] = options[0];
  s.addEventListener("change", e => p[key] = e.target.value);
  return s;
}
function pillBind(p, key, options){
  const row = el("div", {class:"radio-row"});
  for (const opt of options){
    const cur = p[key] || options[0];
    const b = el("button", {
      type:"button",
      class:"radio-pill" + (cur === opt ? " on" : ""),
      onClick:()=>{ p[key] = opt; render(); }
    }, opt);
    row.appendChild(b);
  }
  if (!p[key]) p[key] = options[0];
  return row;
}

async function handlePIQNext(){

    if (!p.fullName?.trim() || !p.state?.trim()){ state.piqError = "Full name and state are required."; render(); return; }

    if (!p.cls10 || !p.cls12){ state.piqError = "Class 10 and Class 12 percentages are required."; render(); return; }

    if (!p.whyDefence?.trim() || p.whyDefence.trim().length < 30){ state.piqError = "‘Why defence?’ — write at least a couple of sentences."; render(); return; }
  } else if (state.piqStep === 4){

  p.email = state.email;

  generateQuestions();
}

   AI: Generate questions
   ========================================================= */
async function generateQuestions(){
  state.generatingQuestions = true;
  state.screen = "loading";
  state.loadingMsg = "Analyzing your profile…";
  state.loadingSub = "Cross-referencing PIQ entries against likely board questions.";
  render();

  // rotate the message a couple of times so it feels alive
  const msgs = [
    ["Analyzing your profile…", "Cross-referencing PIQ entries against likely board questions."],
    ["Preparing your briefing…", "Building hobby deep-dives and current-affairs links."],
    ["Stamping the question set…", "Tagging difficulty and category."],
  ];
  let mi = 0;
  const ticker = setInterval(() => {
    mi = (mi + 1) % msgs.length;
    state.loadingMsg = msgs[mi][0];
    state.loadingSub = msgs[mi][1];
    // light DOM patch
    const m = document.querySelector(".loading-msg");
    const s = document.querySelector(".loading-sub");
    if (m) m.textContent = state.loadingMsg;
    if (s) s.textContent = state.loadingSub;
  }, 2200);

  const sys = `You are an SSB Interview coach for Future Army Officers Academy. Based on the candidate's PIQ profile, generate 20-25 specific interview questions they are most likely to face at SSB.

Rules:
- 70% questions should be based on their PIQ (education, family, hobbies, state, background)
- 15% should be follow-up/deep-dive questions (especially on hobbies — if they listed Guitar, ask about Capo, strings, chords vs leads, famous guitarists)
- 15% should be current affairs / geo-political (India's relations with neighbours, defence news)
- For hobbies: ask DEEP technical questions, not surface level. If they can't answer these, they shouldn't list that hobby.
- If they have drop years or marks drop, include "Why did your percentage drop from X to Y?"
- If they are repeaters (attempts > 0), include "Where did you lack in previous attempts?" and "What improvements have you made?"
- If their state is a border state, include questions about that border's strategic importance
- Include 2-3 rapid fire questions (e.g., "Name 5 indigenous weapons of Indian Army")
- Include 1 calculation/perception question

Return ONLY a JSON array of objects, no prose, no markdown fences:
[{"id": 1, "question": "...", "category": "Education|Family|Hobbies|Defence|Current Affairs|Rapid Fire", "difficulty": "Easy|Medium|Hard"}]`;

  const profileJson = JSON.stringify(redactProfile(state.profile), null, 2);
  const user = `CANDIDATE PIQ PROFILE:\n${profileJson}\n\nGenerate the question set as specified.`;

  let raw = "";
  try{
    raw = await aiComplete(sys + "\n\n" + user, { maxTokens: 2000 });
  } catch(e){
    clearInterval(ticker);
    state.generatingQuestions = false;
    state.screen = "dashboard";
    toast("Could not reach AI. Showing fallback set.");
    state.questions = fallbackQuestions(state.profile);
    try{ await saveQuestionSet(state.uid, state.questions); }catch(_){}
    render();
    return;
  }
  clearInterval(ticker);
  state.generatingQuestions = false;

  let parsed = parseQuestions(raw);
  if (!parsed || !parsed.length){
    parsed = fallbackQuestions(state.profile);
    toast("AI returned an unexpected format. Using fallback questions.");
  }
  state.questions = parsed;
  state.practice = {}; // reset practice on fresh set
  try{
    await saveQuestionSet(state.uid, parsed);
    await clearPractice(state.uid);
    await syncMyStanding();
  } catch(e){
    console.error(e);
    toast("Saved locally but cloud sync failed: " + (e.message || ""));
  }
  state.screen = "dashboard";
  render();
}

function redactProfile(p){
  // strip internal flags
  const { _complete, _savedAt, ...rest } = p || {};
  return rest;
}

function parseQuestions(raw){
  if (!raw) return null;
  // Find first '[' and last ']'
  const i = raw.indexOf("["); const j = raw.lastIndexOf("]");
  if (i < 0 || j < 0 || j <= i) return null;
  const jsonStr = raw.slice(i, j+1);
  try{
    const arr = JSON.parse(jsonStr);
    if (!Array.isArray(arr)) return null;
    return arr.map((q, idx) => ({
      id: q.id ?? (idx+1),
      question: String(q.question || "").trim(),
      category: normalizeCat(q.category),
      difficulty: normalizeDiff(q.difficulty),
    })).filter(q => q.question);
  } catch(e){ return null; }
}
function normalizeCat(c){
  const s = (c||"").toString().trim();
  const allow = ["Education","Family","Hobbies","Defence","Current Affairs","Rapid Fire"];
  const m = allow.find(a => a.toLowerCase() === s.toLowerCase());
  return m || "General";
}
function normalizeDiff(d){
  const s = (d||"").toString().trim().toLowerCase();
  if (s.startsWith("e")) return "Easy";
  if (s.startsWith("h")) return "Hard";
  return "Medium";
}

function fallbackQuestions(p){
  // Used if API is unreachable or returns garbage.
  const qs = [];
  let id = 1;
  const push = (q, category, difficulty="Medium") => qs.push({ id: id++, question: q, category, difficulty });
  push(`Walk me through your daily routine, in detail.`, "Family", "Easy");
  push(`Tell me three strengths and three weaknesses, with one example each.`, "Family", "Medium");
  push(`Why do you want to join the ${p.service || "Indian Armed Forces"}?`, "Defence", "Medium");
  push(`Why this entry — ${p.entryType || "NDA"} — and not others?`, "Defence", "Medium");
  push(`What does your father do, and how has it shaped you?`, "Family", "Easy");
  push(`Class 10: ${p.cls10 || "—"}%. What was your study strategy?`, "Education", "Easy");
  push(`Class 12: ${p.cls12 || "—"}%. What changed between Class 10 and 12?`, "Education", "Medium");
  if (p.dropYears === "yes") push(`You had a drop year — defend that decision in 90 seconds.`, "Education", "Hard");
  if (Number((p.attempts||"0").replace("+",""))>0) push(`Where did you lack in your previous SSB attempt(s), specifically?`, "Defence", "Hard");
  (p.hobbies || []).slice(0,4).forEach(h => {
    push(`You listed ${h} as a hobby. Take me deep — show me you really do it.`, "Hobbies", "Hard");
  });
  push(`Name five indigenous weapons or platforms of the Indian Army.`, "Rapid Fire", "Medium");
  push(`Name three current Service Chiefs.`, "Rapid Fire", "Easy");
  push(`Pick one neighbour of India and explain a recent point of friction.`, "Current Affairs", "Hard");
  push(`Name three Param Vir Chakra recipients and one action each.`, "Rapid Fire", "Hard");
  push(`A train of 240m crosses a 360m bridge in 30 seconds. Speed?`, "Rapid Fire", "Medium");
  push(`Your role model — ${p.roleModel || "—"} — give one act of theirs you would emulate as an officer.`, "Family", "Medium");
  push(`What is one thing about you no one in your family knows?`, "Family", "Hard");
  push(`Define moral courage with an example from your own life.`, "Defence", "Hard");
  push(`What would you do if your senior gave an order you knew to be wrong?`, "Defence", "Hard");
  push(`Five things you would change in your own state if you were CM for a day.`, "Current Affairs", "Medium");
  return qs;
}

  const wrap = el("div", {class:"page fade-in"});

function pctOf(r){
  const t = r.totalQuestions || 0;
  return t ? Math.round(100*(r.questionsPracticed||0)/t) : 0;
}

function renderPodium(rows){
  const stage = el("div", {});
  const top3 = rows.slice(0,3);
  // visual order: 2nd, 1st, 3rd
  const order = [];
  if (top3[1]) order.push({ r: top3[1], rank: 2 });
  if (top3[0]) order.push({ r: top3[0], rank: 1 });
  if (top3[2]) order.push({ r: top3[2], rank: 3 });

  const podium = el("div", {class:"podium"});
  for (const { r, rank } of order){
    const medal = rank === 1 ? "gold" : rank === 2 ? "silver" : "bronze";
    const isMe = r.uid === state.uid;
    const col = el("div", {class:"pod-col pod-"+medal + (isMe ? " pod-me" : "")});

    // candidate block (above pedestal)
    const who = el("div", {class:"pod-who"});
    who.appendChild(el("div", {class:"pod-medal pod-medal-"+medal}, rank === 1 ? "★" : String(rank)));
    const nm = el("div", {class:"pod-name"}, r.name || "Candidate");
    who.appendChild(nm);
    if (isMe) who.appendChild(el("span", {class:"lb-you"}, "You"));
    who.appendChild(el("div", {class:"pod-entry"}, (r.entryType||"—") + (r.service && r.service!=="—" ? " · "+r.service : "")));
    who.appendChild(el("div", {class:"pod-stat"},
      el("b", {}, String(r.questionsPracticed||0)),
      el("span", {class:"pod-of"}, (r.totalQuestions? " / "+r.totalQuestions : "") + " practiced")
    ));
    who.appendChild(el("div", {class:"pod-pct"}, pctOf(r) + "% complete"));
    col.appendChild(who);

    // pedestal
    const ped = el("div", {class:"pod-base pod-base-"+medal});
    ped.appendChild(el("span", {class:"pod-rank-num"}, String(rank)));
    col.appendChild(ped);

    podium.appendChild(col);
  }
  stage.appendChild(podium);

  // "your standing" chip if user is outside top 3
  const myIdx = rows.findIndex(r => r.uid === state.uid);
  if (myIdx >= 3){
    const me = rows[myIdx];
    stage.appendChild(el("div", {class:"pod-yours"},
      el("span", {class:"pod-yours-rank"}, "#" + (myIdx+1)),
      el("span", {class:"pod-yours-txt"}, "Your standing — ", el("b",{}, me.name||"You")),
      el("span", {class:"pod-yours-stat"}, `${me.questionsPracticed||0} practiced · ${pctOf(me)}%`)

    el("span", {}, `View full merit list`),
    el("span", {class:"pod-cta-meta"}, `${rows.length} candidate${rows.length===1?"":"s"} →`)
  );
  stage.appendChild(cta);

  return stage;
}

function updateWordCount(){
  const txt = (state.answerDraft || "").trim();
  const n = txt ? txt.split(/\s+/).length : 0;
  const lab = document.getElementById("wcLabel");
  if (!lab) return;
  lab.innerHTML = "";
  lab.appendChild(el("span", {}, "Words: "));
  const b = el("b", {class: n >= 50 ? "ok" : ""}, String(n));
  lab.appendChild(b);
}

function nextQuestion(q){
  const idx = state.questions.findIndex(x => x.id === q.id);
  if (idx < 0 || idx >= state.questions.length - 1) return null;
  return state.questions[idx + 1];
}

async function requestFeedback(){
  const q = state.activeQ;
  const answer = (state.answerDraft || "").trim();
  if (answer.split(/\s+/).filter(Boolean).length < 20){
    toast("Write at least 20 words before asking for feedback.");
    return;
  }
  state.feedbackLoading = true;
  state.feedback = null;
  render();

  const sys = `You are a strict SSB Interview coach. The candidate was asked: "${q.question}". Their answer: "${answer}". Their profile: ${JSON.stringify(redactProfile(state.profile))}.

Give brutally honest feedback. Rules:
1. Was the answer detailed (essay-type) or a one-liner? One-liners are unacceptable in SSB.
2. Did they give specific examples? Examples are mandatory to avoid misunderstanding.
3. Is the answer consistent with their PIQ profile? If they claim something not in their profile, flag it.
4. For hobby questions: Did they show DEEP knowledge or surface-level generic answers?
5. For "why defence" type questions: Is it genuine and personal, or copied/generic motivation?
6. Rate the answer: Strong / Acceptable / Needs Work / Poor
7. Give a specific rewritten example of how a better answer would sound (2-3 lines).

Be direct. No "great effort" nonsense. If it's bad, say it's bad and say exactly why.

Return ONLY a JSON object (no prose, no markdown):
{
  "rating": "Strong" | "Acceptable" | "Needs Work" | "Poor",
  "whats_wrong": "...",
  "whats_right": "...",
  "better_answer": "..."
}`;

  let raw = "";
  try{
    raw = await aiComplete(sys, { maxTokens: 1200 });
  } catch(e){
    state.feedbackLoading = false;
    toast("Could not reach AI. Try again.");
    render(); return;
  }

  const parsed = parseFeedback(raw);
  state.feedbackLoading = false;
  if (!parsed){
    // surface the raw text as a fallback
    state.feedback = { rating:"Needs Work", whats_wrong:"", whats_right:"", better_answer:"", raw };
  } else {
    state.feedback = parsed;
  }
  // persist
  state.practice[q.id] = {
    answer,
    feedback: state.feedback,
    rating: state.feedback.rating,
    ts: Date.now(),
  };
  try{
    await savePracticeItem(state.uid, q.id, {
      answer,
      feedback: state.feedback,
      rating: state.feedback.rating,
    });
    await syncMyStanding();
  } catch(e){
    console.error(e);
    toast("Saved in session but cloud write failed.");
  }
  render();
}

function parseFeedback(raw){
  if (!raw) return null;
  const i = raw.indexOf("{"); const j = raw.lastIndexOf("}");
  if (i < 0 || j < 0 || j <= i) return null;
  try{
    const obj = JSON.parse(raw.slice(i, j+1));
    return {
      rating: normalizeRating(obj.rating),
      whats_wrong: String(obj.whats_wrong || "").trim(),
      whats_right: String(obj.whats_right || "").trim(),
      better_answer: String(obj.better_answer || "").trim(),
    };
  } catch(e){ return null; }
}
function normalizeRating(r){
  const s = (r||"").toString().trim().toLowerCase();
  if (s.startsWith("strong")) return "Strong";
  if (s.startsWith("accept")) return "Acceptable";
  if (s.startsWith("poor")) return "Poor";
  return "Needs Work";
}

function renderFeedbackCard(fb){
  const cls =
    fb.rating === "Strong" ? "fb-strong" :
    fb.rating === "Acceptable" ? "fb-acceptable" :
    fb.rating === "Poor" ? "fb-poor" : "fb-needs";
  const c = el("div", {class:"fb-card " + cls});

  const top = el("div", {class:"row-between"});
  top.appendChild(el("div", {class:"eyebrow"}, "Coach's Verdict"));
  top.appendChild(el("span", {class:"fb-rating"}, fb.rating));
  c.appendChild(top);

  if (fb.raw){
    c.appendChild(el("div", {class:"fb-section"},
      el("h4", {}, "Feedback"),
      el("p", {}, fb.raw)
    ));
    return c;
  }

  if (fb.whats_wrong) c.appendChild(el("div", {class:"fb-section"},
    el("h4", {}, "What's Wrong"),
    el("p", {}, fb.whats_wrong)
  ));
  if (fb.whats_right) c.appendChild(el("div", {class:"fb-section"},
    el("h4", {}, "What's Right"),
    el("p", {}, fb.whats_right)
  ));
  if (fb.better_answer) c.appendChild(el("div", {class:"fb-section"},
    el("h4", {}, "Better Answer — Example"),
    el("div", {class:"fb-example"}, fb.better_answer)
  ));
  return c;
}

async function openPT(){
  state.screen = "pt";
  state.ptTab = "workout";
  state.workoutError = "";
  // need a fitness profile first
  if (!state.profile.fitnessProfile){
    state.fitDraft = blankFitness();
    render();
    return;
  }
  await loadTodayWorkout();
}

function blankFitness(){
  return {
    weight:"", height:"", trainAt:"Home", track:"yes",
    runCap:"1-2km", pushups:"", ssbDate:"",
  };
}

async function loadTodayWorkout(){
  const date = todayKey();
  state.workoutDate = date;
  state.workoutLoading = true;
  state.workout = null;
  render();
  try{
    let doc = await loadWorkout(state.uid, date);
    if (doc && Array.isArray(doc.plan) && doc.plan.length){
      state.workout = doc;
    } else {
      // generate fresh for today (deterministic-ish via date seed)
      const yKey = shiftDate(date, -1);
      const yDoc = await loadWorkout(state.uid, yKey);
      const didYesterday = !!(yDoc && yDoc.completedAll);
      let plan;
      try{ plan = await generateWorkout(date, didYesterday); }
      catch(e){ plan = null; }
      if (!plan || !plan.length){ plan = fallbackWorkout(); }
      doc = { uid:state.uid, date, plan, done:{}, runScreenshotUrl:"", completedAll:false };
      await saveWorkout(state.uid, date, { plan, done:{}, runScreenshotUrl:"", completedAll:false });
      state.workout = doc;
    }
    // refresh cached workouts + streak standing
    state.myWorkouts = await loadMyWorkouts(state.uid);
  } catch(e){
    console.error(e);
    state.workoutError = e.message || "Could not load workout.";
  }
  state.workoutLoading = false;
  render();
}

function workoutHasRun(plan){ return (plan||[]).some(e => e.isRun); }
function workoutIsComplete(w){
  if (!w || !Array.isArray(w.plan)) return false;
  const allChecked = w.plan.every(e => w.done && w.done[e.id]);
  const runOk = workoutHasRun(w.plan) ? !!w.runScreenshotUrl : true;
  return allChecked && runOk;
}

async function toggleExercise(id){
  const w = state.workout;
  w.done = w.done || {};
  w.done[id] = !w.done[id];
  const wasComplete = w.completedAll;
  w.completedAll = workoutIsComplete(w);
  render();
  try{
    await saveWorkout(state.uid, w.date, {
      done: w.done,
      completedAll: w.completedAll,
      completedAt: w.completedAll && !wasComplete ? FV.serverTimestamp() : (w.completedAt || null),
    });
    if (w.completedAll && !wasComplete){
      toast("PT COMPLETE — logged.");
      state.myWorkouts = await loadMyWorkouts(state.uid);
      await syncMyPtStanding();
      render();
    }
  } catch(e){ console.error(e); toast("Save failed."); }
}

async function handleRunUpload(file){
  if (!file) return;
  if (!file.type.startsWith("image/")){ toast("Upload an image file."); return; }
  state.runUploading = true; state.runProgress = 0; render();
  try{
    let blob;
    try{ blob = await resizeImage(file); }
    catch(_){ blob = file; } // fall back to original if canvas fails
    const url = await uploadRunScreenshot(state.uid, state.workout.date, blob);
    state.workout.runScreenshotUrl = url;
    const wasComplete = state.workout.completedAll;
    state.workout.completedAll = workoutIsComplete(state.workout);
    await saveWorkout(state.uid, state.workout.date, {
      runScreenshotUrl: url,
      completedAll: state.workout.completedAll,
      completedAt: state.workout.completedAll && !wasComplete ? FV.serverTimestamp() : (state.workout.completedAt || null),
    });
    if (state.workout.completedAll && !wasComplete){
      toast("PT COMPLETE — logged.");
      state.myWorkouts = await loadMyWorkouts(state.uid);
      await syncMyPtStanding();
    } else {
      toast("Run screenshot uploaded.");
    }
  } catch(e){
    console.error(e);
    toast("Upload failed — " + (e.message || "check Storage rules / CORS."));
  }
  state.runUploading = false;
  render();
}

function renderExerciseCard(e, num){
  const checked = !!(state.workout.done && state.workout.done[e.id]);
  const card = el("div", {class:"ex-card" + (checked ? " ex-done" : "")});

  // number + checkbox column
  const left = el("div", {class:"ex-left"});
  left.appendChild(el("div", {class:"ex-num"}, String(num).padStart(2,"0")));
  const box = el("button", {
    class:"ex-check" + (checked ? " on" : ""),
    onClick:()=>toggleExercise(e.id),
    "aria-label":"Mark complete"
  }, checked ? "✓" : "");
  left.appendChild(box);
  card.appendChild(left);

  // body
  const body = el("div", {class:"ex-body"});
  const top = el("div", {class:"ex-top"});
  top.appendChild(el("h3", {class:"ex-name"}, e.name));
  top.appendChild(el("span", {class:"ex-type ex-type-"+e.type.toLowerCase().replace(/\s+/g,'-')}, e.type));
  body.appendChild(top);

  // prescription
  let presc;
  if (e.isRun){
    const bits = [];
    if (e.distance_km) bits.push(`${e.distance_km} km`);
    if (e.target_pace) bits.push(`@ ${e.target_pace}`);
    presc = bits.join("  ") || "Steady run";
  } else {
    const repsTxt = e.reps > 1 ? `${e.reps} reps` : "max hold";
    presc = `${e.sets} × ${repsTxt}`;
  }
  body.appendChild(el("div", {class:"ex-presc"}, presc));

  if (e.notes) body.appendChild(el("div", {class:"ex-notes"}, e.notes));
  if (e.gto_relevance) body.appendChild(el("div", {class:"ex-gto"},
    el("span", {class:"ex-gto-lbl"}, "GTO"),
    el("span", {}, e.gto_relevance)
  ));

  // run upload
  if (e.isRun){
    const runRow = el("div", {class:"ex-run"});
    if (state.workout.runScreenshotUrl){
      const thumb = el("a", {class:"ex-run-thumb", href:state.workout.runScreenshotUrl, target:"_blank"});
      thumb.appendChild(el("img", {src:state.workout.runScreenshotUrl, alt:"Run screenshot"}));
      runRow.appendChild(thumb);
      runRow.appendChild(el("span", {class:"ex-run-ok"}, "✓ Run logged"));
      const re = el("label", {class:"ex-run-btn ex-run-btn-sm"});
      re.appendChild(document.createTextNode("Replace"));
      re.appendChild(fileInput());
      runRow.appendChild(re);
    } else {
      const btn = el("label", {class:"ex-run-btn"});
      btn.appendChild(el("span", {class:"ex-run-cam"}, "📷"));
      btn.appendChild(document.createTextNode(state.runUploading ? " Uploading " : " Upload Run Screenshot"));
      if (state.runUploading) btn.appendChild(el("span", {class:"ex-run-prog"}, (state.runProgress||0)+"%"));
      btn.appendChild(fileInput());
      runRow.appendChild(btn);
      runRow.appendChild(el("span", {class:"ex-run-hint"}, "From Strava, Nike Run, any app"));
    }
    body.appendChild(runRow);
  }

  card.appendChild(body);
  return card;
}

function fileInput(){
  const inp = el("input", {type:"file", accept:"image/*", style:{display:"none"}});
  inp.addEventListener("change", e => {

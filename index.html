function stopOirTimer(){
  if (state._oirTimer){ clearInterval(state._oirTimer); state._oirTimer = null; }
}
function startOirTimer(){
  stopOirTimer();
  const tick = () => {
    state.oirElapsed = Math.floor((Date.now() - state.oirTest.startTs)/1000);
    const remaining = Math.max(0, state.oirLimit - state.oirElapsed);
    const t = document.querySelector(".oir-timer-val");
    if (t){
      t.textContent = fmtClock(remaining);
      t.classList.toggle("danger", remaining <= 60);
    }
    if (remaining <= 0){
      stopOirTimer();
      submitOirTest(true); // auto-submit
    }
  };
  state._oirTimer = setInterval(tick, 1000);
}
function fmtClock(s){
  s = Math.max(0, Math.round(s));
  const m = Math.floor(s/60); const ss = s%60;
  return `${String(m).padStart(2,"0")}:${String(ss).padStart(2,"0")}`;
}

const OIR_TIPS = [
  "Grab a rough notebook and pen — you'll need it for calculations.",
  "OIR tests your speed and accuracy. Stay calm, don't overthink.",
  "For non-verbal questions, trust your first instinct.",
  "Time is limited — attempt every question, don't leave blanks.",
  "Rough work is your best friend. Jot down steps quickly.",
  "Read every option before you commit — distractors are designed to tempt.",
  "Stuck on a question? Mark a best guess and move on. Never freeze.",
  "Coding-decoding: write the alphabet out with position numbers first.",
  "Blood relations: draw a quick family tree, mark gender and generation.",
  "Direction sense: sketch a compass and trace each turn on paper.",
  "Series questions: check differences, then ratios, then alternate patterns.",
  "Accuracy beats bravado — a calm, attempted paper scores better than a rushed one.",
];
function startOirTips(){
  stopOirTips();
  state._oirTipIdx = 0;
  state._oirTipTimer = setInterval(()=>{
    state._oirTipIdx = (state._oirTipIdx + 1) % OIR_TIPS.length;
    const tip = document.querySelector(".oir-tip");
    if (tip){
      tip.classList.add("fade-out");
      setTimeout(()=>{
        tip.textContent = OIR_TIPS[state._oirTipIdx];
        tip.classList.remove("fade-out");
      }, 320);
    }
  }, 3000);
}
function stopOirTips(){ if (state._oirTipTimer){ clearInterval(state._oirTipTimer); state._oirTipTimer = null; } }

// Progress bar: asymptotic crawl toward 99% — always moving (fast early, slow late)
// so it never looks frozen, however long the AI takes. Snaps to 100% on response.
function paintOirProgress(){
  const fill = document.querySelector(".oir-prog-fill");
  const pct = document.querySelector(".oir-prog-pct");
  if (fill) fill.style.width = state.oirProgress + "%";
  if (pct) pct.textContent = Math.round(state.oirProgress) + "%";
}
function startOirProgress(){
  stopOirProgress();
  state.oirProgress = 0;
  state._oirProgTimer = setInterval(()=>{
    // approach 99% — increment shrinks as we climb, but never below a floor,
    // so the bar keeps visibly moving the entire time.
    const remaining = 99 - state.oirProgress;
    const step = Math.max(0.12, remaining * 0.018);
    state.oirProgress = Math.min(99, state.oirProgress + step);
    paintOirProgress();
  }, 90);
}
function stopOirProgress(){ if (state._oirProgTimer){ clearInterval(state._oirProgTimer); state._oirProgTimer = null; } }
async function finishOirProgress(){
  stopOirProgress();
  state.oirProgress = 100;
  paintOirProgress();
  await new Promise(r => setTimeout(r, 450));
}

// "GET READY" 5→1 countdown, 1s each, before revealing the test
function runOirGetReady(){
  return new Promise(resolve => {
    let n = 5;
    state.oirCountdown = n;
    render();
    const iv = setInterval(()=>{
      n--;
      if (n <= 0){ clearInterval(iv); state.oirCountdown = null; resolve(); }
      else { state.oirCountdown = n; render(); }
    }, 1000);
  });
}

async function startOirTest(){
  state.oirView = "test";
  state.oirLoading = true;
  state.oirTest = null;
  state.oirSubmitted = false;
  state.oirCountdown = null;
  state.oirLimit = OIR_LIMITS[state.oirCount] || 480;
  render();
  startOirProgress();
  startOirTips();
  let qs;
  try{ qs = await generateOirTest(state.oirCount, state.oirType); }
  catch(e){ qs = null; }
  stopOirTips();
  if (!qs || qs.length < 5){
    stopOirProgress();
    state.oirLoading = false;
    state.oirView = "dashboard";
    toast("Could not generate the test. Try again in a moment.");
    render();
    return;
  }
  // questions ready → fill bar to 100%, then GET READY countdown, then reveal
  await finishOirProgress();
  await runOirGetReady();
  state.oirTest = { questions: qs, answers: {}, startTs: Date.now() };
  state.oirElapsed = 0;
  state.oirLoading = false;
  render();
  startOirTimer();
}

function selectOirAnswer(qid, letter){
  if (!state.oirTest) return;
  state.oirTest.answers[qid] = letter;
  // Patch the DOM in place — do NOT call render() (it scrolls to top).
  document.querySelectorAll(`.oir-opt[data-qid="${qid}"]`).forEach(btn => {
    btn.classList.toggle("opt-sel", btn.getAttribute("data-letter") === letter);
  });
  // update answered count + progress bar
  const answered = Object.keys(state.oirTest.answers).length;
  const total = state.oirTest.questions.length;
  const cnt = document.querySelector(".oir-testbar-count");
  if (cnt) cnt.textContent = `${answered}/${total} answered`;
  const bar = document.querySelector(".oir-mini-bar > i");
  if (bar) bar.style.width = Math.round(100*answered/total) + "%";
}

async function submitOirTest(auto){
  if (state.oirSubmitted) return; // guard double submit (manual + timer)
  const t = state.oirTest;
  if (!t) return;
  if (!auto){
    const unanswered = t.questions.filter(q => !t.answers[q.id]).length;
    if (unanswered > 0){
      if (!confirm(`${unanswered} question(s) unanswered — they'll be marked wrong. Submit anyway?`)) return;
    }
  }
  state.oirSubmitted = true;
  stopOirTimer();
  const timeTaken = Math.min(state.oirLimit, Math.floor((Date.now() - t.startTs)/1000));
  let correct = 0;
  const topics = new Set();
  const questions = t.questions.map(q => {
    const userAns = t.answers[q.id] || null;
    const isCorrect = userAns === q.correct;
    if (isCorrect) correct++;
    topics.add(q.topic);
    return { ...q, userAnswer: userAns, isCorrect };
  });
  const total = t.questions.length;
  const score = Math.round(100*correct/total);
  const grade = oirGrade(score);
  const result = {
    score, grade, totalQuestions: total, correctAnswers: correct,
    timeTaken, timeLimit: state.oirLimit, autoSubmitted: !!auto,
    topicsCovered: [...topics], questions,
  };
  if (auto) toast("Time up — test auto-submitted.");
  state.oirResult = result;
  state.oirView = "result";
  render();
  // persist
  try{
    await saveOirSession(state.uid, result);
    state.oirSessions = await loadOirSessions(state.uid);
  } catch(e){
    console.error(e);
    toast("Result shown but save failed — " + (e.message || ""));
  }
}

function toJsDate(ts){
  if (!ts) return null;
  if (typeof ts.toDate === "function") return ts.toDate();        // Firestore Timestamp
  if (typeof ts === "object" && typeof ts.seconds === "number") return new Date(ts.seconds*1000); // raw {seconds}
  if (typeof ts === "number") return new Date(ts);                 // epoch ms
  if (typeof ts === "string"){ const d = new Date(ts); return isNaN(d) ? null : d; } // ISO
  if (ts instanceof Date) return ts;
  return null;
}
function fmtSessionDate(ts, isoFallback){
  const d = toJsDate(ts) || toJsDate(isoFallback) || null;
  if (!d || isNaN(d)) return "—";
  const dd = String(d.getDate()).padStart(2,"0");
  const mmm = d.toLocaleDateString("en-GB", { month:"short" });
  return `${dd} ${mmm} ${d.getFullYear()}`;
}

function renderOirQuestion(q, num, review){
  const card = el("div", {class:"oir-q"});
  const top = el("div", {class:"oir-q-top"});
  top.appendChild(el("span", {class:"oir-q-num"}, "Q"+String(num).padStart(2,"0")));
  top.appendChild(el("span", {class:"oir-q-type oir-q-"+(q.type==="non-verbal"?"nv":"v")}, q.type==="non-verbal"?"Non-Verbal":"Verbal"));
  top.appendChild(el("span", {class:"oir-q-topic"}, q.topic));
  if (review){
    top.appendChild(el("span", {class:"oir-q-mark " + (q.isCorrect?"ok":(q.userAnswer?"bad":"skip"))},
      q.isCorrect ? "✓ Correct" : (q.userAnswer ? "✗ Wrong" : "— Skipped")));
  }
  card.appendChild(top);
  card.appendChild(el("p", {class:"oir-q-text"}, q.question));

  const opts = el("div", {class:"oir-opts"});
  q.options.forEach((opt, i) => {
    const letter = optLetter(i);
    const selected = review ? (q.userAnswer === letter) : (state.oirTest.answers[q.id] === letter);
    let cls = "oir-opt";
    if (review){
      if (letter === q.correct) cls += " opt-correct";
      else if (selected) cls += " opt-wrong";
    } else if (selected){
      cls += " opt-sel";
    }
    const o = el("button", {
      class:cls,
      type:"button",
      "data-qid": review ? null : String(q.id),
      "data-letter": review ? null : letter,
      onClick: review ? null : ((ev)=>{ ev.preventDefault(); selectOirAnswer(q.id, letter); })
    });
    o.appendChild(el("span", {class:"oir-opt-key"}, letter));
    // strip leading "A) " from label if present
    const label = opt.replace(/^\s*[A-D]\)\s*/,"");
    o.appendChild(el("span", {class:"oir-opt-txt"}, label));
    if (review && letter === q.correct) o.appendChild(el("span", {class:"oir-opt-tag"}, "Correct"));
    if (review && selected && letter !== q.correct) o.appendChild(el("span", {class:"oir-opt-tag oir-opt-tag-bad"}, "Your answer"));
    opts.appendChild(o);
  });
  card.appendChild(opts);

  if (review && q.explanation){
    card.appendChild(el("div", {class:"oir-expl"},
      el("span", {class:"oir-expl-lbl"}, "Why"),
      el("span", {}, q.explanation)
    ));
  }
  return card;
}

// One question in read-only review: options marked green/red/grey + approach on misses.
function renderReviewQuestion(q, num){
  const correct = q.isCorrect;
  const attempted = !!q.userAnswer;
  const card = el("div", {class:"oir-q" + (correct ? "" : " oir-mistake")});
  const top = el("div", {class:"oir-q-top"});
  top.appendChild(el("span", {class:"oir-q-num"}, "Q"+String(num).padStart(2,"0")));
  top.appendChild(el("span", {class:"oir-q-type oir-q-"+(q.type==="non-verbal"?"nv":"v")}, q.type==="non-verbal"?"Non-Verbal":"Verbal"));
  top.appendChild(el("span", {class:"oir-q-topic"}, (q.topic||"").toUpperCase()));
  top.appendChild(el("span", {class:"oir-q-mark " + (correct?"ok":(attempted?"bad":"skip"))},
    correct ? "✓ Correct" : (attempted ? "✗ Wrong" : "— Not Attempted")));
  card.appendChild(top);
  card.appendChild(el("p", {class:"oir-q-text"}, q.question));

  const opts = el("div", {class:"oir-opts"});
  (q.options||[]).forEach((opt, i) => {
    const letter = optLetter(i);
    const isCorrectOpt = letter === q.correct;
    const isUserOpt = letter === q.userAnswer;
    let cls = "oir-opt oir-opt-static";
    if (isCorrectOpt) cls += " opt-correct";
    else if (isUserOpt) cls += " opt-wrong";
    const o = el("div", {class:cls});
    o.appendChild(el("span", {class:"oir-opt-key"}, letter));
    o.appendChild(el("span", {class:"oir-opt-txt"}, opt.replace(/^\s*[A-D]\)\s*/,"")));
    if (isCorrectOpt) o.appendChild(el("span", {class:"oir-opt-tag"}, "Correct"));
    else if (isUserOpt) o.appendChild(el("span", {class:"oir-opt-tag oir-opt-tag-bad"}, "Your answer"));
    opts.appendChild(o);
  });
  // grey "not attempted" note
  if (!attempted){
    opts.appendChild(el("div", {class:"oir-skip-note"}, "Not attempted — left blank"));
  }
  card.appendChild(opts);

  // approach on wrong/skipped
  if (!correct){
    const method = q.approach || q.explanation;
    if (method){
      card.appendChild(el("div", {class:"oir-approach"},
        el("div", {class:"oir-approach-lbl"}, "How to approach this"),
        el("p", {class:"oir-approach-txt"}, method)
      ));
    }
  } else if (q.explanation){
    card.appendChild(el("div", {class:"oir-expl"},
      el("span", {class:"oir-expl-lbl"}, "Why"),
      el("span", {}, q.explanation)
    ));
  }
  return card;
}

  w.appendChild(el("div", {class:"loading-mark"}));
  w.appendChild(el("div", {class:"loading-msg"}, msg));
  if (sub) w.appendChild(el("div", {class:"loading-sub"}, sub));
  c.appendChild(w);
  return c;
}

/* =========================================================
   Boot — onAuthStateChanged drives routing
   ========================================================= */
render();
</script>
